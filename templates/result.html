<!DOCTYPE html>
<html>
<head>

    <title>Prediction Result</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
        }

        .box{
            width:450px;
            margin:100px auto;
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#0b5394;
        }

        h2{
            color:green;
            margin-top:20px;
        }

        a{
            text-decoration:none;
            background:#0b5394;
            color:white;
            padding:12px 25px;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="box">

<h1>Smart Lender</h1>

<h2>{{ prediction }}</h2>

<br><br>

<a href="/">Predict Another Loan</a>

</div>

</body>
</html>
