<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:500px;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#0b5394;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0b5394;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#073763;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Smart Lender</h2>

<form action="/predict" method="POST">

<label>Number of Dependents</label>
<input type="number" name="no_of_dependents" required>

<label>Education</label>
<select name="education">
    <option>Graduate</option>
    <option>Not Graduate</option>
</select>

<label>Self Employed</label>
<select name="self_employed">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Annual Income</label>
<input type="number" name="income_annum" required>

<label>Loan Amount</label>
<input type="number" name="loan_amount" required>

<label>Loan Term</label>
<input type="number" name="loan_term" required>

<label>CIBIL Score</label>
<input type="number" name="cibil_score" required>

<label>Residential Assets Value</label>
<input type="number" name="residential_assets_value" required>

<label>Commercial Assets Value</label>
<input type="number" name="commercial_assets_value" required>

<label>Luxury Assets Value</label>
<input type="number" name="luxury_assets_value" required>

<label>Bank Assets Value</label>
<input type="number" name="bank_asset_value" required>

<button type="submit">Predict Loan Status</button>

</form>

</div>

</body>
</html>
